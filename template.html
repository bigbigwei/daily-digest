<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} · 每日简报</title>
<style>
/* ===== Theme Variables ===== */
:root[data-theme="dark"] {
  --bg: #000000;
  --bg-elevated: #0a0a0a;
  --bg-card: #111111;
  --bg-card-hover: #1a1a1a;
  --text: #f0f0f0;
  --text-secondary: #999999;
  --text-muted: #555555;
  --border: #222222;
  --accent: #00d4ff;
  --accent-dim: rgba(0,212,255,0.1);
  --accent-glow: rgba(0,212,255,0.15);
  --tag-ai: #a78bfa;
  --tag-ai-bg: rgba(167,139,250,0.12);
  --tag-tech: #22d3ee;
  --tag-tech-bg: rgba(34,211,238,0.1);
  --tag-finance: #fbbf24;
  --tag-finance-bg: rgba(251,191,36,0.1);
  --tag-science: #34d399;
  --tag-science-bg: rgba(52,211,153,0.1);
  --tag-product: #fb7185;
  --tag-product-bg: rgba(251,113,133,0.1);
  --tag-dev: #818cf8;
  --tag-dev-bg: rgba(129,140,248,0.1);
  --up: #ef4444;
  --down: #22c55e;
  --shadow: 0 0 0 1px rgba(255,255,255,0.04);
  --shadow-hover: 0 8px 40px rgba(0,212,255,0.06), 0 0 0 1px rgba(255,255,255,0.08);
  --radius: 12px;
}
:root[data-theme="light"] {
  --bg: #fafafa;
  --bg-elevated: #ffffff;
  --bg-card: #ffffff;
  --bg-card-hover: #f5f5f5;
  --text: #111111;
  --text-secondary: #666666;
  --text-muted: #999999;
  --border: #e8e8e8;
  --accent: #0066ff;
  --accent-dim: rgba(0,102,255,0.06);
  --accent-glow: rgba(0,102,255,0.08);
  --tag-ai: #7c3aed;
  --tag-ai-bg: rgba(124,58,237,0.08);
  --tag-tech: #0891b2;
  --tag-tech-bg: rgba(8,145,178,0.08);
  --tag-finance: #d97706;
  --tag-finance-bg: rgba(217,119,6,0.08);
  --tag-science: #059669;
  --tag-science-bg: rgba(5,150,105,0.08);
  --tag-product: #e11d48;
  --tag-product-bg: rgba(225,29,72,0.08);
  --tag-dev: #4f46e5;
  --tag-dev-bg: rgba(79,70,229,0.08);
  --up: #dc2626;
  --down: #16a34a;
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-hover: 0 8px 30px rgba(0,0,0,0.08);
  --radius: 12px;
}

/* ===== Reset ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  transition: background 0.4s, color 0.4s;
}
a { color: var(--accent); text-decoration: none; transition: opacity 0.2s; }
a:hover { opacity: 0.8; }

/* ===== Progress Bar ===== */
.progress-bar {
  position: fixed;
  top: 0; left: 0;
  height: 2px;
  background: var(--accent);
  z-index: 200;
  width: 0%;
  transition: width 0.1s;
}

/* ===== Top Bar ===== */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 14px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  transition: background 0.3s;
}
[data-theme="light"] .topbar { background: rgba(255,255,255,0.9); }
.topbar-left { display: flex; align-items: center; gap: 16px; }
.topbar-brand {
  font-size: 13px; font-weight: 600;
  letter-spacing: 3px; text-transform: uppercase;
  color: var(--text-secondary);
}
.topbar-back {
  font-size: 13px; color: var(--accent);
  display: flex; align-items: center; gap: 4px;
}
.theme-toggle {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  width: 34px; height: 34px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

/* ===== Nav ===== */
.nav-bar {
  position: sticky;
  top: 52px;
  z-index: 90;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  transition: background 0.3s;
}
.nav-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 32px;
  display: flex;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.nav-inner::-webkit-scrollbar { display: none; }
.nav-item {
  padding: 12px 16px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  white-space: nowrap;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.nav-item:hover, .nav-item.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* ===== Hero ===== */
.hero {
  padding: 100px 48px 60px;
  max-width: 1200px;
  margin: 0 auto;
}
.hero-issue {
  display: inline-block;
  font-size: 12px; font-weight: 600;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--accent);
  border: 1px solid var(--accent);
  padding: 5px 12px;
  border-radius: 4px;
  margin-bottom: 20px;
}
.hero-date {
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: 16px;
}
.hero h1 {
  font-size: clamp(32px, 5vw, 52px);
  font-weight: 800;
  line-height: 1.15;
  letter-spacing: -1.5px;
  margin-bottom: 20px;
}
.hero-summary {
  font-size: 17px;
  line-height: 1.75;
  color: var(--text-secondary);
  max-width: 720px;
  margin-bottom: 28px;
}
.hero-stats {
  display: flex; gap: 28px; flex-wrap: wrap;
}
.hero-stat-value {
  font-size: 24px; font-weight: 700;
  font-variant-numeric: tabular-nums;
}
.hero-stat-label {
  font-size: 11px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 1px;
}

/* ===== Container ===== */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 48px 80px;
}

/* ===== Section ===== */
.section { margin-bottom: 56px; }
.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
}
.section-icon { font-size: 20px; }
.section-title {
  font-size: 18px; font-weight: 700;
  letter-spacing: -0.2px;
}
.section-count {
  margin-left: auto;
  font-size: 12px;
  color: var(--text-muted);
}
.section-header::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
  order: 99;
}
.section-count { order: 98; }

/* ===== News Grid ===== */
.news-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 14px;
}
.news-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px;
  transition: all 0.3s;
  display: flex;
  flex-direction: column;
}
.news-card:hover {
  background: var(--bg-card-hover);
  box-shadow: var(--shadow-hover);
  transform: translateY(-2px);
}
.news-card-tag {
  display: inline-flex;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.5px;
  padding: 3px 8px;
  border-radius: 4px;
  margin-bottom: 10px;
  width: fit-content;
}
.tag-ai { color: var(--tag-ai); background: var(--tag-ai-bg); }
.tag-tech { color: var(--tag-tech); background: var(--tag-tech-bg); }
.tag-finance { color: var(--tag-finance); background: var(--tag-finance-bg); }
.tag-science { color: var(--tag-science); background: var(--tag-science-bg); }
.tag-product { color: var(--tag-product); background: var(--tag-product-bg); }
.tag-dev { color: var(--tag-dev); background: var(--tag-dev-bg); }

.news-card h3 {
  font-size: 16px; font-weight: 600;
  margin-bottom: 8px; line-height: 1.5;
  letter-spacing: -0.2px;
}
.news-card h3 a { color: var(--text); }
.news-card h3 a:hover { color: var(--accent); }
.news-card p {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.65;
  flex: 1;
}
.news-card-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-muted);
}

/* ===== Headline ===== */
.headline-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
}
.headline-card h2 {
  font-size: 24px; font-weight: 700;
  margin-bottom: 16px; line-height: 1.4;
  letter-spacing: -0.5px;
}
.headline-card p {
  font-size: 16px;
  color: var(--text-secondary);
  line-height: 1.8;
}
.headline-tag {
  display: inline-block;
  font-size: 11px; font-weight: 600;
  padding: 3px 8px;
  border-radius: 4px;
  margin-bottom: 14px;
}

/* ===== Market Data ===== */
.market-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
  gap: 12px;
}
.market-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
  transition: all 0.2s;
}
.market-item:hover { border-color: rgba(0,212,255,0.2); }
.market-item .name { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
.market-item .value { font-size: 20px; font-weight: 700; margin-bottom: 2px; font-variant-numeric: tabular-nums; }
.market-item .change { font-size: 14px; font-weight: 600; }
.up { color: var(--up); }
.down { color: var(--down); }

/* ===== Deep Read ===== */
.deep-read-list { display: flex; flex-direction: column; gap: 14px; }
.deep-read-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  display: flex;
  transition: all 0.3s;
}
.deep-read-card:hover {
  background: var(--bg-card-hover);
  box-shadow: var(--shadow-hover);
  transform: translateY(-2px);
}
.deep-read-number {
  display: flex; align-items: center; justify-content: center;
  min-width: 64px;
  font-size: 32px; font-weight: 800;
  color: var(--accent); opacity: 0.2;
}
.deep-read-body {
  padding: 20px 24px 20px 0; flex: 1;
}
.deep-read-body h3 {
  font-size: 17px; font-weight: 600;
  margin-bottom: 8px; line-height: 1.5;
}
.deep-read-body h3 a { color: var(--text); }
.deep-read-body h3 a:hover { color: var(--accent); }
.deep-read-body p {
  font-size: 14px; color: var(--text-secondary); line-height: 1.65; margin-bottom: 10px;
}
.deep-read-meta {
  display: flex; gap: 16px; font-size: 12px; color: var(--text-muted);
}

/* ===== Quotes ===== */
.quotes-list { display: flex; flex-direction: column; gap: 14px; }
.quote-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px 28px;
  position: relative;
}
.quote-card::before {
  content: '"';
  position: absolute; top: 16px; left: 20px;
  font-size: 40px; color: var(--accent); opacity: 0.15;
  font-family: Georgia, serif; line-height: 1;
}
.quote-text {
  font-size: 15px; line-height: 1.75;
  margin-bottom: 10px; padding-left: 4px;
  font-style: italic;
}
.quote-author {
  font-size: 13px; color: var(--text-muted);
  font-weight: 500; padding-left: 4px;
}

/* ===== Tools ===== */
.tool-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
}
.tool-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px;
  transition: all 0.3s;
}
.tool-card:hover { background: var(--bg-card-hover); box-shadow: var(--shadow-hover); transform: translateY(-2px); }
.tool-card h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.tool-card p { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }
.tool-card-link {
  display: inline-block; margin-top: 10px;
  font-size: 13px; font-weight: 600; color: var(--accent);
}

/* ===== Back link ===== */
.archive-section {
  text-align: center; padding: 40px 0;
  border-top: 1px solid var(--border);
}
.archive-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 14px; font-weight: 500; color: var(--accent);
  padding: 12px 24px; border-radius: 8px;
  border: 1px solid var(--accent);
  transition: all 0.2s;
}
.archive-link:hover { background: var(--accent); color: #000; }

/* ===== Footer ===== */
.footer {
  text-align: center;
  padding: 32px;
  font-size: 13px;
  color: var(--text-muted);
  border-top: 1px solid var(--border);
}

/* ===== Back to Top ===== */
.back-to-top {
  position: fixed; bottom: 24px; right: 24px;
  width: 42px; height: 42px;
  border-radius: 50%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--accent);
  cursor: pointer; font-size: 18px;
  box-shadow: var(--shadow);
  opacity: 0; transform: translateY(20px);
  transition: all 0.3s; z-index: 99;
}
.back-to-top.visible { opacity: 1; transform: translateY(0); }
.back-to-top:hover { background: var(--accent); color: #000; border-color: var(--accent); }

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .topbar { padding: 12px 20px; }
  .hero { padding: 80px 24px 40px; }
  .hero h1 { font-size: 28px; letter-spacing: -1px; }
  .container { padding: 0 24px 60px; }
  .news-grid { grid-template-columns: 1fr; }
  .market-grid { grid-template-columns: repeat(2, 1fr); }
  .tool-grid { grid-template-columns: 1fr; }
  .headline-card { padding: 24px; }
  .headline-card h2 { font-size: 20px; }
  .deep-read-card { flex-direction: column; }
  .deep-read-number { min-width: unset; padding: 16px 20px 0; justify-content: flex-start; font-size: 24px; }
  .deep-read-body { padding: 12px 20px 20px; }
  .nav-inner { padding: 0 20px; }
  .nav-item { padding: 10px 14px; font-size: 12px; }
}

/* ===== Animations ===== */
@media (prefers-reduced-motion: no-preference) {
  .news-card, .deep-read-card, .quote-card, .tool-card {
    animation: fadeIn 0.4s ease backwards;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
}
</style>
</head>
<body>

<div class="progress-bar" id="progressBar"></div>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-left">
    <a href="../index.html" class="topbar-back">← 首页</a>
    <span class="topbar-brand">Daily Digest</span>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" aria-label="Toggle theme">☀️</button>
</div>

<!-- Nav -->
<nav class="nav-bar">
  <div class="nav-inner">
    <div class="nav-item active" data-section="headline">头条</div>
    <div class="nav-item" data-section="ai">AI</div>
    <div class="nav-item" data-section="tech">科技</div>
    <div class="nav-item" data-section="finance">财经</div>
    <div class="nav-item" data-section="market">行情</div>
    <div class="nav-item" data-section="science">科学</div>
    <div class="nav-item" data-section="product">产品</div>
    <div class="nav-item" data-section="deepread">深度</div>
    <div class="nav-item" data-section="devtool">工具</div>
    <div class="nav-item" data-section="quotes">言论</div>
  </div>
</nav>

<!-- Hero -->
<header class="hero">
  <span class="hero-issue">{{ISSUE_LABEL}}</span>
  <div class="hero-date">{{DATE_DISPLAY}}</div>
  <h1>{{TITLE}}</h1>
  <p class="hero-summary">{{SUMMARY}}</p>
  <div class="hero-stats">
    <div class="hero-stat"><span class="hero-stat-value">{{NEWS_COUNT}}</span><span class="hero-stat-label">资讯</span></div>
    <div class="hero-stat"><span class="hero-stat-value">{{DEEP_READ_COUNT}}</span><span class="hero-stat-label">深度</span></div>
    <div class="hero-stat"><span class="hero-stat-value">{{SOURCE_COUNT}}</span><span class="hero-stat-label">信源</span></div>
    <div class="hero-stat"><span class="hero-stat-value">~{{READ_TIME}}</span><span class="hero-stat-label">分钟</span></div>
  </div>
</header>

<main class="container">
  <!-- Sections: headline, ai, tech, finance, market, science, product, deepread, devtool, quotes -->
  {{MAIN_CONTENT}}

  <div class="archive-section">
    <a href="../index.html" class="archive-link">← 查看往期简报</a>
  </div>
</main>

<footer class="footer">由 AI 自动抓取与编辑 · 每日 07:00 更新 · news.huangwei.ai</footer>

<button class="back-to-top" id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
function toggleTheme() {
  const html = document.documentElement;
  const btn = document.getElementById('themeBtn');
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  btn.textContent = isDark ? '🌙' : '☀️';
  localStorage.setItem('theme', isDark ? 'light' : 'dark');
}
(function() {
  const saved = localStorage.getItem('theme');
  if (saved === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
    document.getElementById('themeBtn').textContent = '🌙';
  }
})();
window.addEventListener('scroll', () => {
  const h = document.documentElement;
  const p = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100;
  document.getElementById('progressBar').style.width = p + '%';
  document.getElementById('backToTop').classList.toggle('visible', h.scrollTop > 400);
});
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    const s = document.getElementById(item.dataset.section);
    if (s) s.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
});
const sects = document.querySelectorAll('.section');
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      const nav = document.querySelector(`.nav-item[data-section="${e.target.id}"]`);
      if (nav) nav.classList.add('active');
    }
  });
}, { rootMargin: '-100px 0px -50% 0px' });
sects.forEach(s => obs.observe(s));
</script>
</body>
</html>
